<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio (WIP)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; box-sizing: border-box; }
        body { background: #0a0e1a; }
        input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #4a90d9; cursor: pointer; margin-top: -7px; }
        input[type=range]::-webkit-slider-runnable-track { height: 4px; background: #1a3a8f44; border-radius: 2px; }
    </style>
</head>
<body>
<div id="root"></div>
<script src="app.js"></script>
</body>
</html>
